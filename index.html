<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Tris Svanente</title>

<!-- Libreria PeerJS per connessioni P2P -->
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
  :root{
    --bg-1:#cec9d2;
    --bg-2:#b3abbd;
    --surface:rgba(255,255,255,0.46);
    --surface-strong:rgba(255,255,255,0.78);
    --surface-edge:rgba(255,255,255,0.85);
    --ink:#362f3d;
    --ink-soft:#6e6478;
    --ink-faint:#948aa0;
    --p1:#f0a63c;
    --p1-deep:#c9822a;
    --p1-glow:#ffd28f;
    --p2:#cfe34e;
    --p2-deep:#a3b834;
    --p2-glow:#ecf9a6;
    --line:rgba(54,47,61,0.13);
    --shadow:0 18px 40px -14px rgba(54,47,61,0.35);
    --radius-lg:22px;
    --radius-md:16px;
    --font-display:'Segoe UI','Trebuchet MS',system-ui,sans-serif;
    --font-body:'Segoe UI',system-ui,sans-serif;
    --font-num:'Courier New',ui-monospace,monospace;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

  body{
    margin:0;
    min-height:100vh;
    font-family:var(--font-body);
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.5), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,0.35), transparent 50%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
    background-attachment:fixed;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:22px 14px 34px;
    -webkit-font-smoothing:antialiased;
  }

  h1,h2,h3{margin:0;font-family:var(--font-display);}

  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
  .site-title{text-align:center;margin-bottom:18px;}
  .site-title h1{font-size:clamp(26px,5vw,38px);font-weight:800;letter-spacing:.02em;text-transform:uppercase;}
  .site-title h1 span{color:var(--p1-deep);}
  .site-title h1 em{font-style:normal;color:var(--p2-deep);}
  .site-title p{margin-top:4px;color:var(--ink-soft);font-size:13px;letter-spacing:.03em;}

  .layout{
    width:100%;max-width:820px;display:grid;
    grid-template-columns:180px minmax(280px,360px) 180px;
    grid-template-areas:"p1card center p2card";gap:18px;align-items:start;justify-content:center;
  }
  .player-card.p1{grid-area:p1card;}
  .player-card.p2{grid-area:p2card;}
  .center-col{grid-area:center;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;}

  .panel{background:var(--surface);border:1px solid var(--surface-edge);border-radius:var(--radius-lg);box-shadow:var(--shadow);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);position:relative;}
  
  .player-card{padding:16px 14px;text-align:center;}
  .player-card .symbol-badge{width:34px;height:34px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
  .player-nick{font-weight:700;font-size:15px;min-height:20px;}
  .player-role{margin-top:2px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);}
  .score-block{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line);}
  .score-value{font-family:var(--font-num);font-weight:700;font-size:34px;margin-top:2px;}
  .player-card.active{border-color:var(--p1-glow);box-shadow:0 0 0 3px var(--p1-glow), var(--shadow);transform:translateY(-2px);}
  .active-badge{display:none;margin-top:10px;font-size:10px;padding:4px 8px;border-radius:20px;}
  .player-card.active .active-badge{display:inline-block;background:var(--p1-glow);}

  .board-wrap{padding:18px;position:relative;}
  .board{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:min(320px,84vw);aspect-ratio:1/1;gap:8px;background:rgba(255,255,255,0.35);border-radius:var(--radius-md);padding:10px;}
  
  .cell{background:rgba(255,255,255,0.35);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;}
  .cell.fading svg{animation:gentle-pulse 1.2s ease-in-out infinite;}
  @keyframes gentle-pulse {0%, 100% { opacity: 0.9; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.9); }}
  
  .cell.pop-in svg{animation:pop-in .32s cubic-bezier(.34,1.56,.64,1);}
  @keyframes pop-in{0%{transform:scale(0.25);opacity:0;}65%{transform:scale(1.14);opacity:1;}100%{transform:scale(1);opacity:1;}}
  
  .cell.vanish-out svg{animation:vanish-out .32s ease forwards;}
  @keyframes vanish-out{0%{opacity:0.85;transform:scale(1) rotate(0deg);}100%{opacity:0;transform:scale(0.35) rotate(14deg);}}

  .btn{font-family:var(--font-body);font-weight:700;padding:8px 16px;border-radius:20px;border:1px solid var(--surface-edge);background:var(--surface-strong);color:var(--ink);cursor:pointer;}
  .overlay{position:fixed;inset:0;background:rgba(46,41,53,0.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;}
  .modal{width:100%;max-width:380px;padding:26px;}
  .hidden{display:none !important;}
  .online-pill{display:inline-flex;align-items:center;gap:6px;font-size:10px;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:var(--surface-strong);}
</style>
</head>
<body>

  <div class="site-title">
    <div class="eyebrow">Duello acrilico</div>
    <h1><span>TRIS</span> <em>SVANENTE</em></h1>
  </div>

  <div class="layout">
    <div class="panel player-card p1" id="card-p1">
      <div class="player-nick" id="nick-p1-label">Giocatore 1</div>
      <div class="score-value" id="score-p1">0</div>
    </div>

    <div class="center-col">
      <div class="online-pill hidden" id="online-pill">Partita online</div>
      <div class="panel board-wrap"><div class="board" id="board"></div></div>
      <div class="toolbar">
        <button class="btn" id="btn-restart">Ricomincia tutto</button>
      </div>
    </div>

    <div class="panel player-card p2" id="card-p2">
      <div class="player-nick" id="nick-p2-label">Giocatore 2</div>
      <div class="score-value" id="score-p2">0</div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div class="overlay" id="mode-overlay">
    <div class="panel modal">
      <h2>Come vuoi giocare?</h2>
      <button class="btn" id="btn-mode-local" style="width:100%; margin-bottom:10px;">Stesso dispositivo</button>
      <button class="btn" id="btn-mode-online" style="width:100%;">Online</button>
    </div>
  </div>

  <div class="overlay hidden" id="setup-overlay">
    <div class="panel modal">
      <input type="text" id="input-nick1" placeholder="Nick 1">
      <input type="text" id="input-nick2" placeholder="Nick 2">
      <button class="btn" id="btn-start">Inizia</button>
    </div>
  </div>

  <div class="overlay hidden" id="round-overlay">
    <div class="panel modal">
      <h2 id="round-title">Round concluso</h2>
      <button class="btn" id="btn-next-round">Prossimo round</button>
    </div>
  </div>

<script>
(function(){
  "use strict";

  const MAX_MARKS = 4;
  let cells = new Array(9).fill(null);
  let queues = {1:[], 2:[]};
  let scores = {1:0, 2:0};
  let currentPlayer = 1;
  let gameActive = false;
  let totalMoves = 0;
  const boardEl = document.getElementById('board');
  const cellEls = [];

  function buildBoard(){
    for(let i=0;i<9;i++){
      const d = document.createElement('div');
      d.className = 'cell';
      d.addEventListener('click', ()=>handleCellClick(i));
      boardEl.appendChild(d);
      cellEls.push(d);
    }
  }

  function syncFadingWarnings() {
    cellEls.forEach(el => el.classList.remove('fading'));
    const q = queues[currentPlayer];
    if(q && q.length >= MAX_MARKS && cellEls[q[0]]) {
      cellEls[q[0]].classList.add('fading');
    }
  }

  function handleCellClick(i){
    if(!gameActive || cells[i] !== null) return;
    
    cells[i] = currentPlayer;
    queues[currentPlayer].push(i);
    totalMoves++;
    
    cellEls[i].innerHTML = currentPlayer === 1 ? 'O' : 'X';
    cellEls[i].classList.add('pop-in');

    if(queues[currentPlayer].length > MAX_MARKS){
      const old = queues[currentPlayer].shift();
      cells[old] = null;
      cellEls[old].classList.add('vanish-out');
      setTimeout(()=>{ if(cells[old]===null) cellEls[old].innerHTML=''; }, 300);
    }

    if(totalMoves >= 16) return; // Logic for win/draw would go here
    currentPlayer = currentPlayer === 1 ? 2 : 1;
    syncFadingWarnings();
  }

  document.getElementById('btn-mode-local').addEventListener('click', () => {
    document.getElementById('mode-overlay').classList.add('hidden');
    document.getElementById('setup-overlay').classList.remove('hidden');
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('setup-overlay').classList.add('hidden');
    gameActive = true;
    syncFadingWarnings();
  });

  buildBoard();
})();
</script>
</body>
</html>
